[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python scripts/railway_entry.py"
# Every 5 min during US market hours (EDT = UTC-4): ~9:30 AM–4:00 PM ET, Mon–Fri
# Prefer always-on worker: set TRADE_LOOP_SECONDS=300 and remove cronSchedule.
# Nov–Mar (EST): shift +1 hour → use "*/5 14-21 * * 1-5"
cronSchedule = "*/5 13-20 * * 1-5"
restartPolicyType = "NEVER"
