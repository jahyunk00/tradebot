[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python scripts/railway_entry.py"
# Every 30 min during US market hours (EDT = UTC-4): ~9:15 AM–3:45 PM ET, Mon–Fri
# Nov–Mar (EST): shift +1 hour → use "15,45 14-20 * * 1-5"
cronSchedule = "15,45 13-19 * * 1-5"
restartPolicyType = "NEVER"
