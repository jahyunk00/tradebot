mode: auto_execute
engine: boss
# Fallback if screener fails (large-cap leaders)
watchlist:
- AAPL
- MSFT
- NVDA
- GOOGL
- AMZN
- META
- JPM
- V
universe:
  enabled: true
  rotation_enabled: true
  min_market_cap_b: 50
  min_return_1y_pct: 5
  pool_size: 30
  top_n: 15
  swap_margin_pct: 1
  lookback_days: 252
  cache_hours: 4
paper_trials:
  enabled: false
  max_paper_slots: 3
  max_live_promoted: 3
  virtual_usd: 30
  campaign_days: 30
  min_sessions: 2
  min_return_pct: 1.5
  drop_below_pct: -4.0
  min_model_score: 0.22
  bear_fast_track: true
  bear_min_sessions: 1
  bear_min_return_pct: 0.5
  bear_min_model_score: 0.18
launch_schedule:
  enabled: false
  live_start_date: "2026-06-09"
  pilot_bankroll_usd: 50
  live_full_bankroll: true
backtest:
  lookback_days: 365
  initial_capital: 100
  strategy: ensemble_weighted
ensemble:
  weights:
    kronos: 0.3462
    hmm: 0.336
    third_leg: 0.3179
  third_leg_model: bayesian_changepoint
  rebalance_days: 5
  min_combined_score: 0.3
  backtest_use_kronos: false
  backtest_use_third_leg: false
boss:
  enabled: true
  min_combined_score: 0.18
  strategist_weight: 0.4
  portfolio_mode: multi
  max_picks: 6
  rotate_out: true
  momentum_weight: 0.65
  max_buys_per_run: 3
  max_sells_per_run: 2
  min_staged_buy_usd: 18
  exit_rules:
    enabled: true
    stop_loss_pct: 3.5
    take_profit_pct: 4.5
    take_profit_2_pct: 8.0
    partial_take_profit: 0.5
    trailing_stop_pct: 2.5
    trailing_activate_pct: 2.5
    use_strategist_levels: true
  option_trading:
    enabled: false
    side: call
    min_days_to_expiry: 3
    max_days_to_expiry: 21
    max_contracts_per_run: 1
    max_underlyings_per_run: 1
    min_cash_to_trade_usd: 50
  weights_path: logs/boss_weights.json
  paper_portfolio_path: logs/paper_portfolio.json
  learning_rate: 0.08
  training:
    lookback_days: 730
    warmup_days: 252
    rebalance_days: 5
    forward_days: 5
    min_train_samples: 12
    use_kronos: false
    use_third_leg: true
    third_leg_model: bayesian_changepoint
bear_mode:
  enabled: true
  min_news_score: 0.05
  block_metrics_only: false
  oversold_rsi: 42.0
  stop_tighten_pct: 0.2
  tp1_r: 0.75
  tp2_r: 1.5
  tp3_r: 2.0
pharma:
  enabled: false
  max_market_cap_b: 20.0
  small_cap_boost: 0.25
  news_weight: 0.1
  news_headlines: 8
  benchmark_ticker: SPY
hmm:
  n_states: 3
  lookback: 252
  vol_window: 20
bayesian_changepoint:
  lookback: 252
  penalty: 3.0
  min_segment: 10
tft:
  input_chunk_length: 60
  output_chunk_length: 5
  train_length: 200
  hidden_size: 16
  n_epochs: 5
kronos:
  enabled: true
  model_id: NeoQuasar/Kronos-mini
  tokenizer_id: NeoQuasar/Kronos-Tokenizer-2k
  lookback: 400
  pred_len: 5
  temperature: 0.6
  top_p: 0.9
  sample_count: 3
llm:
  model: claude-sonnet-4-20250514
  max_tokens: 4096
robinhood:
  mcp_url: https://agent.robinhood.com/mcp/trading
logging:
  directory: logs
  level: INFO
retail:
  benchmark_ticker: SPY
  news_headlines_per_ticker: 5
