# Hard limits — the agent cannot override these programmatically.

# Block all order placement while true (overrides config mode for safety)
force_analyze_only: true

# Order limits (apply when auto_execute is enabled)
max_order_usd: 500
max_position_pct: 15          # max % of agentic account in one ticker
max_daily_trades: 3
max_open_positions: 5

# Only these tickers can ever be traded
allowed_tickers:
  - SPY
  - QQQ
  - AAPL
  - MSFT
  - NVDA
  - GOOGL
  - AMZN
  - META

# Blocked order types in auto mode (limit to safer types initially)
allowed_order_types:
  - market
  - limit

# Require backtest gate before any live execution
require_backtest_pass: true

# Backtest must meet guardrails.yaml thresholds AND config.yaml backtest section
backtest_gate:
  min_sharpe_ratio: 0.5
  min_win_rate_pct: 45
  max_drawdown_pct: 20
  min_total_return_pct: 5

# Cooldown between trades (minutes)
min_minutes_between_trades: 60

# Reject trades outside regular US market hours (Eastern)
enforce_market_hours: true
