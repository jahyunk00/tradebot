# Hard limits — the agent cannot override these programmatically.

force_analyze_only: false

bankroll:
  mode: dynamic
  initial_usd: 150
  ceiling_usd: null
  require_cash_only: true
  reinvest_profits: true

# High-activity growth sprint — staged buys, faster rotation, tighter exits.
max_order_usd: null
max_position_pct: 30
max_daily_trades: 60
max_open_positions: 8

# When universe screener is on, allowed_tickers is refreshed each run from screener output.
allowed_tickers:
  - SPY

allowed_order_types:
  - market
  - limit

require_backtest_pass: false   # trial day — cap is the main safety rail
require_beats_benchmark: false

backtest_gate:
  min_sharpe_ratio: 0.3
  min_win_rate_pct: 40
  max_drawdown_pct: 35
  min_total_return_pct: 0

min_minutes_between_trades: 0
enforce_market_hours: true
no_same_day_round_trip: false
